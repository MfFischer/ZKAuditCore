name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest -q

      - name: Generate sample artifacts
        run: zk-auditcore analyze fixtures/circuits/vulnerable_sample.json --out-dir artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zk-auditcore-artifacts
          path: artifacts/
